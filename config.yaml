kalshi:
  environment: demo  # demo | production

trading:
  strategy: null_strategy
  # List market tickers to watch. Find tickers at https://kalshi.com/markets
  markets:
    - KXBTCD-25DEC31-T100000  # example — replace with real tickers
  loop_interval_seconds: 60

risk:
  max_contracts_per_market: 10   # max open contracts on any single market
  max_open_orders: 5
  max_daily_loss_cents: 5000     # $50 — paper mode: simulated; live mode: enforced

execution:
  mode: paper  # paper | live
  paper_starting_balance_cents: 100000  # $1,000 starting paper balance
