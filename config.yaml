kalshi:
  environment: demo  # demo | production

logging:
  level: DEBUG  # DEBUG | INFO | WARNING | ERROR

universe:
  window_hours: 12                  # discover markets closing within this window
  refresh_interval_seconds: 3600    # re-run discovery every hour
  min_volume: 100                   # minimum all-time volume
  max_spread_cents: 20              # maximum bid/ask spread in cents
  exclude_prefixes:
    - KXMVE                         # exclude parlay markets
  series_whitelist:
    - KXBTCD                        # only BTC daily price markets for now

trading:
  strategy: btc_strategy
  loop_interval_seconds: 30

risk:
  max_contracts_per_market: 10
  max_open_orders: 5
  max_daily_loss_cents: 5000

execution:
  mode: demo
  paper_starting_balance_cents: 100000
